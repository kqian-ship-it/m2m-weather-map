            div.innerHTML = summaryHtml;
            return div;
        };
        info.addTo(map);
        
        // Fit bounds to show all markers
        if (markersData.length > 0) {
            const bounds = L.latLngBounds(markersData.map(m => [m.lat, m.lng]));
            map.fitBounds(bounds, { padding: [30, 30] });
        }
    </script>
</body>
</html>

            subdomains: 'abcd',

        }).addTo(map);
        
        // Add region circle markers
        regionMarkers.forEach(r => {
            const radius = Math.max(15, Math.min(35, r.total * 1.2 + 10));
            
            const circle = L.circleMarker([r.lat, r.lng], {
                radius: radius,
                fillColor: r.color,
                color: '#fff',
                weight: 2,
                opacity: 1,
                fillOpacity: 0.7
            }).addTo(map);

                <div class="popup-content">

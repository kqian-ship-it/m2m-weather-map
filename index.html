        .header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
        }
        
        .header h1 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .header .timestamp {
            font-size: 13px;
            color: #94a3b8;
        }
        
        .legend {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 13px;
            line-height: 1.8;
        }
        
        .legend h4 {
            margin-bottom: 6px;
            font-size: 14px;
            color: #1e293b;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid;
            flex-shrink: 0;
        }
        
        .popup-content {
            min-width: 250px;
            font-size: 13px;
        }
        
        .popup-content h3 {
            font-size: 15px;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .popup-content .risk-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            color: white;
            margin-left: 6px;
        }
        
        .popup-content .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
            margin: 8px 0;
        }
        
        .popup-content .stat-label {
            color: #64748b;
            font-size: 12px;
        }
        
        .popup-content .stat-value {
            font-weight: 600;
            font-size: 14px;
        }
        
        .popup-content .alerts-list {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
        }
        
        .popup-content .alert-item {
            font-size: 12px;
            color: #475569;
            padding: 2px 0;
        }
        
        .popup-content .vacant-list {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #e2e8f0;
            max-height: 120px;
            overflow-y: auto;
        }
        
        .popup-content .vacant-item {
            font-size: 11px;
            color: #dc2626;
            padding: 1px 0;
        }
        
        .warning-icon {
            font-size: 20px;
            text-shadow: 0 0 6px rgba(220, 38, 38, 0.6);
        }
        
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .pulse-warning {
            animation: pulse 1.5s ease-in-out infinite;
            display: inline-block;
        }
        
        .summary-bar {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
            padding: 8px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            display: flex;
            gap: 20px;
            font-size: 13px;
        }
        
        .summary-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .summary-count {
            font-weight: 700;
            font-size: 16px;
        }
    </style>

            counts[r.risk]++;
            if (r.has_priority_vacant) counts.priority++;
        });
        document.getElementById('critical-count').textContent = counts.CRITICAL;
        document.getElementById('severe-count').textContent = counts.SEVERE;

        document.getElementById('low-count').textContent = counts.LOW;
        document.getElementById('priority-count').textContent = counts.priority;
        
        // Initialize map
        const map = L.map('map').setView([37.5, -98.0], 4);

            attribution: '&copy; OpenStreetMap contributors | M2M Weather Alert System',
            maxZoom: 18
        }).addTo(map);
        
        // Add markers for each region
        regionData.forEach(region => {
            // Circle marker sized by total properties
            const radius = Math.max(12, Math.min(30, region.total * 0.8));
            
            const circle = L.circleMarker([region.lat, region.lng], {
                radius: radius,
                fillColor: region.fill_color,
                color: region.color,
                weight: 3,
                opacity: 1,
                fillOpacity: 0.6
            }).addTo(map);
            
            // Risk badge color
            const riskBadgeColor = {
                'CRITICAL': '#dc2626',
                'SEVERE': '#ea580c',
                'MODERATE': '#ca8a04',
                'LOW': '#16a34a'
            }[region.risk] || '#6b7280';
            
            // Build popup content
            let popupHtml = `
                <div class="popup-content">
                    <h3>${region.name} <span class="risk-badge" style="background:${riskBadgeColor}">${region.risk}</span></h3>
                    <div class="stats">
                        <div>
                            <div class="stat-label">${region.has_priority_vacant ? '⚠️ Vacant' : 'Vacant'}</div>
                            <div class="stat-value" style="color: ${region.vacant > 0 ? '#dc2626' : '#16a34a'}">${region.vacant}</div>
                        </div>
                        <div>
                            <div class="stat-label">Occupied</div>
                            <div class="stat-value">${region.occupied}</div>
                        </div>
                        <div>
                            <div class="stat-label">Total</div>
                            <div class="stat-value">${region.total}</div>
                        </div>
                        <div>
                            <div class="stat-label">Alerts</div>
                            <div class="stat-value">${region.alert_texts.length}</div>
                        </div>
                    </div>
            `;
            
            if (region.alert_texts.length > 0) {
                popupHtml += '<div class="alerts-list"><strong>Active Alerts:</strong>';
                region.alert_texts.forEach(a => {
                    popupHtml += `<div class="alert-item">🔔 ${a}</div>`;
                });
                popupHtml += '</div>';
            }
            
            if (region.vacant_addresses.length > 0 && region.has_priority_vacant) {
                popupHtml += '<div class="vacant-list"><strong>⚠️ Priority Vacant Properties:</strong>';
                region.vacant_addresses.forEach(addr => {
                    popupHtml += `<div class="vacant-item">🏠 ${addr}</div>`;
                });
                popupHtml += '</div>';
            }
            
            popupHtml += '</div>';
            circle.bindPopup(popupHtml, { maxWidth: 350 });
            
            // Add warning icon for vacant properties in MODERATE-CRITICAL zones
            if (region.has_priority_vacant) {
                const warningIcon = L.divIcon({
                    html: '<div class="pulse-warning warning-icon">⚠️</div>',
                    className: '',
                    iconSize: [24, 24],
                    iconAnchor: [12, 12]
                });
                
                L.marker([region.lat + 0.15, region.lng + 0.15], {
                    icon: warningIcon,
                    interactive: false
                }).addTo(map);
            }
            
            // Add region label
            const labelIcon = L.divIcon({
                html: `<div style="
                    font-size: 10px;
                    font-weight: 600;
                    color: ${region.color};
                    text-shadow: 1px 1px 2px white, -1px -1px 2px white;
                    white-space: nowrap;
                    text-align: center;
                ">${region.name}</div>`,
                className: '',
                iconSize: [120, 20],
                iconAnchor: [60, -radius - 2]
            });
            
            L.marker([region.lat, region.lng], {
                icon: labelIcon,
                interactive: false
            }).addTo(map);
        });
        
        // Add legend
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function(map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Risk Level</h4>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #fca5a5; border-color: #dc2626;"></div>
                    <span>CRITICAL - Immediate danger</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #fdba74; border-color: #ea580c;"></div>
                    <span>SEVERE - Significant threat</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #fde047; border-color: #ca8a04;"></div>
                    <span>MODERATE - Advisory active</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot" style="background: #86efac; border-color: #16a34a;"></div>
                    <span>LOW - No significant alerts</span>
                </div>
                <div class="legend-item" style="margin-top: 6px; padding-top: 6px; border-top: 1px solid #e2e8f0;">
                    <span class="pulse-warning">⚠️</span>
                    <span>Vacant property in risk zone</span>
                </div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

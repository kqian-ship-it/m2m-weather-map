        #map { width: 100%; height: calc(100vh - 60px); }

            color: white;

            align-items: center;
            justify-content: space-between;

            font-weight: 600;
        }

            font-size: 14px;
            color: #94a3b8;

            color: white;
            font-size: 13px;
            line-height: 1.8;
            border: 1px solid #334155;
            backdrop-filter: blur(10px);
        }
        .legend h4 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #e2e8f0;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .stats-panel {
            background: rgba(15, 23, 42, 0.95);
            padding: 14px 18px;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            border: 1px solid #334155;
            min-width: 200px;
        }
        .stats-panel h4 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #e2e8f0;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
        }
        .stat-value {
            font-weight: bold;
        }
        
        /* Pulsing animation for warning markers */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .warning-pulse {
            animation: pulse 2s ease-in-out infinite;
        }
        .warning-icon {
            font-size: 24px;
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.8);
            cursor: pointer;
        }
        
        /* Leaflet popup customization */
        .leaflet-popup-content-wrapper {

                color: r.color,
                fillColor: r.color,
                fillOpacity: r.fill_opacity,
                radius: r.radius,
                weight: 2,
                opacity: 0.8
            }).addTo(map);
            
            circle.bindPopup(r.popup, { maxWidth: 300 });
            
            // Warning icon for vacant properties in risk zones
            if (r.has_warning) {
                var warningIcon = L.divIcon({
                    html: '<div class="warning-pulse warning-icon">⚠️</div>',
                    className: '',
                    iconSize: [30, 30],
                    iconAnchor: [15, 15]
                });
                
                var warningMarker = L.marker([r.lat + 0.15, r.lng + 0.15], {
                    icon: warningIcon
                }).addTo(map);
                
                warningMarker.bindPopup(
                    '<div style="font-family:Arial;min-width:180px;">' +
                    '<b style="color:' + r.color + ';">⚠️ ' + r.name + '</b><br>' +
                    '<span style="color:#dc2626;font-weight:bold;">Vacant: ' + r.vacant + '</span> in ' + r.risk + ' zone<br>' +
                    '<span style="color:#16a34a;">Occupied: ' + r.occupied + '</span>' +

                <div class="stat-row"><span style="color:#ea580c;">SEVERE:</span><span class="stat-value">` + severeCount + ` properties</span></div>

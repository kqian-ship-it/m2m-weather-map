            position: absolute;
            z-index: 1000;
            font-size: 20px;
            pointer-events: none;
            animation: pulse 1.5s ease-in-out infinite;

            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        
        .stats-panel {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            font-size: 12px;

        .stats-panel h4 { margin-bottom: 6px; color: #1a237e; font-size: 13px; }
        .stat-row { display: flex; justify-content: space-between; padding: 2px 0; }
        .stat-label { color: #666; }
        .stat-value { font-weight: bold; }
        .stat-critical { color: #FF4444; }

        // Add markers
        markersData.forEach(function(m) {
            // Circle marker
            var circle = L.circleMarker([m.lat, m.lon], {
                radius: m.radius,
                fillColor: m.color,
                color: m.color,
                weight: 2,
                opacity: 0.9,
                fillOpacity: 0.5
            }).addTo(map);
            
            circle.bindPopup(m.popup, { maxWidth: 350 });
            
            // Add pulsing warning icon for vacant properties at risk
            if (m.has_warning) {
                var warningIcon = L.divIcon({
                    className: 'warning-icon',
                    html: '⚠️',
                    iconSize: [24, 24],
                    iconAnchor: [12, -5]

            border-radius: 10px;

            color: white;
            font-size: 13px;
            line-height: 1.8;

            margin-bottom: 8px;
            font-size: 14px;
            color: #e2e8f0;
        }
        .legend-item {

            align-items: center;
            gap: 8px;
        }
        .legend-circle {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: inline-block;
            border: 2px solid rgba(255,255,255,0.3);
        }
        
        /* Pulsing animation for warning markers */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .warning-icon {
            animation: pulse 2s ease-in-out infinite;
            font-size: 24px;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.8);
            cursor: pointer;
        }
        
        /* Info panel */
        #info-panel {
            position: absolute;
            top: 80px;
            right: 10px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 14px 18px;
            color: white;
            font-size: 12px;
            max-width: 280px;
            max-height: 60vh;
            overflow-y: auto;
        }
        #info-panel h4 {
            font-size: 14px;
            margin-bottom: 10px;
            color: #f59e0b;
        }
        .priority-item {
            padding: 6px 0;
            border-bottom: 1px solid #1e293b;
            font-size: 11px;
            line-height: 1.4;
        }
        .priority-item:last-child { border-bottom: none; }
        .risk-badge {
            display: inline-block;

            font-size: 10px;
            font-weight: 700;
            margin-right: 4px;

        .risk-MODERATE { background: #eab308; color: #1e293b; }

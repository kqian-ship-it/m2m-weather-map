            var div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <h4>Weather Risk Level</h4>
                <div class="legend-item"><div class="legend-dot" style="background: #fca5a5; border-color: #dc2626;"></div> CRITICAL</div>
                <div class="legend-item"><div class="legend-dot" style="background: #fdba74; border-color: #ea580c;"></div> SEVERE</div>
                <div class="legend-item"><div class="legend-dot" style="background: #fcd34d; border-color: #d97706;"></div> MODERATE</div>
                <div class="legend-item"><div class="legend-dot" style="background: #86efac; border-color: #16a34a;"></div> LOW</div>
                <hr style="margin: 6px 0; border-color: #e5e7eb;">
                <div class="legend-item"><span style="font-size: 16px;">⚠️</span> Vacant at Risk</div>
                <div class="legend-item"><div class="legend-dot" style="background: #6b7280; border-color: #6b7280; opacity: 0.3;"></div> Occupied</div>
            `;
            return div;
        };
        legend.addTo(map);
    </script>
</body>
</html>

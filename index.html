const map = L.map('map', {
  center: [38.5, -98.0],
  zoom: 4,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Add legend
const legend = L.control({position: 'bottomright'});
legend.onAdd = function(map) {
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>风险等级</h4>
    <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div> CRITICAL (极端)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ea580c;"></div> SEVERE (严重)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ca8a04;"></div> MODERATE (中等)</div>
    <div class="legend-item"><div class="legend-dot" style="background:#16a34a;"></div> LOW (低)</div>
    <div style="margin-top:8px;border-top:1px solid #475569;padding-top:6px;">
      <div class="legend-item"><span class="warning-pulse">⚠️</span> 空置房源在预警区</div>
    </div>
  `;
  return div;
};
legend.addTo(map);

// Add markers
markers.forEach(m => {
  // Circle size based on total properties
  const radius = Math.max(12, Math.min(30, 8 + m.total * 0.5));
  
  const circle = L.circleMarker([m.lat, m.lng], {
    radius: radius,
    fillColor: m.color,
    color: m.has_warning ? '#fbbf24' : m.color,
    weight: m.has_warning ? 3 : 2,
    opacity: 0.9,
    fillOpacity: 0.6,
    dashArray: m.has_warning ? '5,5' : null,
  }).addTo(map);
  
  circle.bindPopup(m.popup, {maxWidth: 360});
  
  // Add warning icon for vacant at risk
  if (m.has_warning) {
    const warningIcon = L.divIcon({
      className: '',
      html: '<div class="warning-pulse" style="font-size:20px;text-shadow:0 0 6px rgba(251,191,36,0.8);">⚠️</div>',
      iconSize: [24, 24],
      iconAnchor: [12, 12],
    });
    L.marker([m.lat + 0.3, m.lng + 0.3], {icon: warningIcon}).addTo(map)
      .bindPopup(m.popup, {maxWidth: 360});
  }
  
  // Add label
  const labelIcon = L.divIcon({
    className: '',
    html: `<div style="
      color: white;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      white-space: nowrap;
      pointer-events: none;
    ">${m.warning}${m.region}<br><span style="font-size:9px;opacity:0.8;">V:${m.vacant} O:${m.occupied}</span></div>`,
    iconSize: [120, 30],
    iconAnchor: [60, -radius - 2],
  });
  L.marker([m.lat, m.lng], {icon: labelIcon, interactive: false}).addTo(map);
});

            display: flex;
            align-items: center;
            gap: 4px;
        }
        .header .stat .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .legend {
            background: white;
            padding: 12px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 12px;
            line-height: 1.8;
        }
        .legend h4 {
            margin-bottom: 6px;
            font-size: 13px;
            color: #333;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid rgba(0,0,0,0.2);
        }
        .summary-panel {
            background: white;
            padding: 14px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
            min-width: 280px;
        }
        .summary-panel h4 {
            margin-bottom: 8px;
            font-size: 14px;
            color: #1e3a5f;
        }
        .region-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .region-row:last-child { border-bottom: none; }
        .region-name { font-weight: 500; }
        .risk-badge {
            padding: 2px 8px;
            border-radius: 10px;
            color: white;
            font-size: 10px;
            font-weight: 600;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .warning-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
